name: .NET

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore ./src/HumanResources.sln
    - name: Build
      run: dotnet build ./src/HumanResources.sln --no-restore
    - name: Test
      run: dotnet test ./src/HumanResources.sln --no-build --verbosity normal
